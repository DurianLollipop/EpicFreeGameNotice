name: Epic Free Game Notifier

on:
  # 定时任务：每天北京时间上午 10:00 运行 (UTC 02:00)
  schedule:
    - cron: '0 2 * * *'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      new_game_window_hours:
        description: "只推送多少小时内新上架的免费游戏；填 0 表示不限制，适合测试"
        required: false
        default: "0"

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Notifier
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BARK_URL: ${{ secrets.BARK_URL }}
          BARK_GROUP: ${{ secrets.BARK_GROUP }}
          NEW_GAME_WINDOW_HOURS: ${{ github.event_name == 'workflow_dispatch' && inputs.new_game_window_hours || vars.NEW_GAME_WINDOW_HOURS || '28' }}
        run: python main.py
